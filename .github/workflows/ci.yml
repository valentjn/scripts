name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: check formatting with Ruff
        run: uv run ruff format --diff
      - name: lint with Ruff
        run: uv run ruff check
      - name: lint with mypy and ty
        run: |
          for SCRIPT in src/*.py
          do
            echo
            echo "linting $SCRIPT"
            uv sync --script "$SCRIPT"
            SCRIPT_PYTHON="$(uv python find --script "$SCRIPT")"
            SCRIPT_SITE_PACKAGES="$("$SCRIPT_PYTHON" -c '
              import site
              print(next(p for p in site.getsitepackages() if "site-packages" in p))
            ')"
            echo "using site-packages: $SCRIPT_SITE_PACKAGES"
            echo
            echo "running mypy on $SCRIPT"
            PYTHONPATH="$SCRIPT_SITE_PACKAGES" uv run mypy "$SCRIPT"
            echo
            echo "running ty on $SCRIPT"
            PYTHONPATH="$SCRIPT_SITE_PACKAGES" uv run ty check "$SCRIPT"
          done
